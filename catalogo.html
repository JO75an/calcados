<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | shoes company</title>
    <link rel="stylesheet" href="style-catalogo.css">
    <link rel="stylesheet" href="style-index.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">SAPATOS & CIA</a>
        <nav><a href="index.html">Voltar para Home</a></nav>
    </header>

    <div class="banner-titulo">
        <h1>Catálogo Infantojuvenil</h1>
        <p>Disponível nos tamanhos 35, 36, 37, 38, 39, 40, 41, 42 e 43</p>
    </div>

    <div class="filtros">
        <button>35</button><button>36</button><button>37</button>
        <button>38</button><button>39</button><button>40</button>
        <button>41</button><button>42</button><button>43</button>
    </div>

    <main class="grid">
        <div class="card">
            <img src="image.png" alt="Tênis">
            <div class="card-info">
                <h3>Tênis Neon Sport</h3>
                <p>Tamanho: 35 ao 43</p>
                <div class="preco">R$ 219,90</div>
                <a href="#" class="btn-comprar">Comprar</a>
            </div>
        </div>
        <div class="card">
            <img src="https://unsplash.com" alt="Tênis">
            <div class="card-info">
                <h3>Sneaker Urban Blue</h3>
                <p>Tamanho: 35 ao 43</p>
                <div class="preco">R$ 289,90</div>
                <a href="#" class="btn-comprar">Comprar</a>
            </div>
        </div>
    </main>
</body>
</html>
